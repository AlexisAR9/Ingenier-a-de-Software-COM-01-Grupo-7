<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Centro Cultural</title>
    <link rel="stylesheet" href="registro.css">
</head>

<body>
    <header>
        <h1>Registro</h1>
        <p>Crea tu cuenta y añade tu taller al Centro Cultural</p>
        <nav class="main-nav">
            <a href="registro.html" class="nav-btn active">📝 Registro</a>
        </nav>
    </header>

    <main id="register-spa">
        <div class="form-container">
            <h2 id="form-title">Paso 1: Datos Personales</h2>
            <form id="reg-form" onsubmit="guardarTaller(event)">
                
                <div id="step-1">
                    <div class="form-group"><label>Nombre:</label><input type="text" id="c-name" required></div>
                    <div class="form-group"><label>Teléfono:</label><input type="text" id="c-phone" required></div>
                    <div class="form-group"><label>Correo:</label><input type="email" id="c-email" required></div>
                    <button type="button" class="btn" onclick="nextStep()">Siguiente ➔</button>
                </div>

                <div id="step-2" style="display: none;">
                    <div class="form-group"><label>Foto URL:</label><input type="url" id="w-img" required></div>
                    <div class="form-group"><label>Nombre del Taller:</label><input type="text" id="w-name" required>
                    </div>
                    <div class="form-group"><label>Descripción:</label><textarea id="w-desc" required></textarea></div>
                    <div class="form-group"><label>Actividades (separadas por coma):</label><input type="text"
                            id="w-act" required></div>

                    <div class="form-group">
                        <label>Rubro:</label>
                        <select id="w-cat" required>
                            <option value="">Seleccione...</option>
                            <option value="Gastronomía">Gastronomía</option>
                            <option value="Carpintería">Carpintería</option>
                            <option value="Artesanías">Artesanías</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo:</label>
                        <select id="w-type" onchange="toggleFields()" required>
                            <option value="propio">Propio (Centro Cultural)</option>
                            <option value="particular">Particular</option>
                        </select>
                    </div>

                    <div id="fields-propio" class="cond-box">
                        <div class="form-group"><label>Módulo:</label><input type="number" id="w-mod"></div>
                        <div class="form-group"><label>Aula:</label><input type="number" id="w-aula"></div>
                    </div>

                    <div id="fields-part" class="cond-box" style="display:none;">
                        <div class="form-group"><label>Dirección:</label><input type="text" id="w-dir"></div>
                        <div class="form-group"><label>Horarios:</label><input type="text" id="w-hrs"></div>
                    </div>

                    <div class="form-group"><label>Teléfono Contacto:</label><input type="text" id="w-tel" required>
                    </div>
                    <div class="form-group"><label>Redes Sociales:</label><input type="text" id="w-soc" required></div>

                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button type="button" class="btn gray" onclick="prevStep()">Volver</button>
                        <button type="submit" class="btn green">Finalizar</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="registro.js"></script>
</body>

</html>
